name: Formatting

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cmake:
    name: CMake (neocmakelsp)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install neocmakelsp
        run: |
          url="https://github.com/neocmakelsp/neocmakelsp/releases/latest/download"
          curl -fsSL "$url/neocmakelsp-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Check CMake formatting
        run: |
          files=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }} \
            -- '*.cmake' '*CMakeLists.txt')
          [ -z "$files" ] && exit 0
          echo "$files" | xargs neocmakelsp format -i
          git diff --exit-code

  yaml:
    name: YAML (yamllint)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yamllint
        run: pip install yamllint

      - name: Check YAML formatting
        run: |
          files=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }} \
            -- '*.yml' '*.yaml')
          [ -z "$files" ] && exit 0
          echo "$files" | xargs yamllint -c .yamllint.yml

  python:
    name: Python (ruff)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install ruff
        run: pip install ruff

      - name: Check Python formatting
        run: |
          files=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }} \
            -- '*.py')
          [ -z "$files" ] && exit 0
          echo "$files" | xargs ruff format --check

  cpp:
    name: C++ (clang-format)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install clang-format and clang-format-diff
        run: |
          pip install clang-format
          base="https://raw.githubusercontent.com/llvm/llvm-project/main"
          curl -fsSL "$base/clang/tools/clang-format/clang-format-diff.py" \
            -o /usr/local/bin/clang-format-diff
          chmod +x /usr/local/bin/clang-format-diff

      - name: Check formatting
        run: |
          git diff -U0 origin/${{ github.base_ref }} -- '*.cpp' '*.hpp' \
            | clang-format-diff -p1 -style file | tee /tmp/clang-format.patch
          test ! -s /tmp/clang-format.patch
