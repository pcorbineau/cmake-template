name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  code-quality: write
  pull-requests: read

jobs:
  build:
    name: ${{ matrix.os.name }} ${{ matrix.build.preset }}
    runs-on: ${{ matrix.os.runner }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: Linux GCC
            runner: ubuntu-24.04
            cc: gcc-16
            cxx: g++-16
            coverage_name: gcc
          - name: macOS Clang
            runner: macos-26
            cc: clang
            cxx: clang++
            coverage_name: clang
          - name: Windows MSVC
            runner: windows-2025-vs2026
            coverage_name: msvc
        build:
          - preset: debug
            conan_build_type: Debug
            coverage: false
          - preset: release
            conan_build_type: Release
            coverage: false
          - preset: coverage
            conan_build_type: Debug
            coverage: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install GCC 16 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -q
          sudo apt-get install -y gcc-16 g++-16

      - name: Install OpenCppCoverage (Windows)
        if: runner.os == 'Windows' && matrix.build.coverage
        run: choco install opencppcoverage -y

      # Ninja 1.13.2 is already pre-installed on macos-26 and windows-2025-vs2026

      - name: Set up Python with pip cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: .github/requirements.txt

      - name: Install Python tools
        run: pip install -r .github/requirements.txt

      - name: Configure Conan profile
        run: conan profile detect --force

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\18\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set >> %GITHUB_ENV%

      - name: Detect LLVM root (macOS)
        if: runner.os == 'macOS' && matrix.build.coverage
        run: echo "LLVM_ROOT=$(xcrun -f llvm-cov | xargs dirname)" >> $GITHUB_ENV

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.conan2/p
            ~\AppData\Local\conan\p
          key: conan-${{ matrix.os.name }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: conan-${{ matrix.os.name }}-

      - name: Set up ccache
        uses: actions/cache@v5
        with:
          path: ${{ runner.os == 'Windows' && '~\AppData\Local\ccache' || '~/.cache/ccache' }}
          key: ccache-${{ matrix.os.name }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os.name }}-${{ github.ref_name }}-
            ccache-${{ matrix.os.name }}-

      - name: Install dependencies with Conan
        run: >
          conan install . --build=missing
          -s build_type=${{ matrix.build.conan_build_type }}
          -c tools.cmake.cmaketoolchain:generator=Ninja
          --profile:host=conan/profiles/ci
        env:
          CC: ${{ matrix.os.cc }}
          CXX: ${{ matrix.os.cxx }}

      - name: Configure
        run: cmake --preset ${{ matrix.build.preset }}
        env:
          CC: ${{ matrix.os.cc }}
          CXX: ${{ matrix.os.cxx }}

      - name: Build
        run: cmake --build build/

      - name: Test
        run: ctest --test-dir build/ --output-on-failure

      - name: Coverage report
        if: matrix.build.coverage
        run: cmake --build build/ --target coverage

      - name: Upload code coverage
        if: matrix.build.coverage
        uses: actions/upload-code-coverage@v1
        with:
          file: build/coverage_report/cobertura.xml
          language: C++
          label: code-coverage/${{ matrix.os.coverage_name }}

      - name: Upload coverage report artifact
        if: matrix.build.coverage && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os.coverage_name }}
          path: build/coverage_report/
          retention-days: 1

  deploy-coverage:
    name: Deploy coverage page
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download clang coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-clang
          path: pages/clang/

      - name: Download gcc coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-gcc
          path: pages/gcc/

      - name: Download msvc coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-msvc
          path: pages/msvc/

      - name: Create landing page
        run: cp .github/pages/index.html pages/index.html

      - name: Generate coverage summary
        run: python3 .github/scripts/merge_coverage_summary.py

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
